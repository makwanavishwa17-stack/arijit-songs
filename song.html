<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         body{
           margin:0;
           background:linear-gradient(to right,black,darkslateblue);
           color:white;
           text-align: center;
        }
        h1{
            font-size:80px;
        }
         button{
            width:200px;
            height:60px;
            margin:15px;
            font-size: 18px;
            border-radius:10px;
            border:none;
            cursor: pointer;
        }
        button:hover{
            transform:scale(1.1);
            filter:brightness(1.2);
            box-shadow: 0px 0px 15px black;
            transition: 0.3s;
        }
        #romentic{background: linear-gradient(to right,purple,deeppink);}
        #sad{background: linear-gradient(to right,lightgray,dimgray);}
        #party{background: linear-gradient(to right,gold,orangered);}
        #soft{background: linear-gradient(to right,cyan,royalblue);}
    </style>
</head>
<body>
    <h1>🎧Choose your song type🎶</h1><br>
    <a href="Romentic song.html">
    <button id="romentic">Romentic</button>
    </a>
    <a href="Sad song.html">
    <button id="sad">Sad</button>
    </a>
    <a href="Party song.html">
    <button id="party">Party</button>
    </a>
    <a href="Soft song.html">
    <button id="soft">Soft</button>
    </a>
    
</body>
</html>
