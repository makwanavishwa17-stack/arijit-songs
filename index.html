<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arijit Singh songs</title>
    <Style>
        body{
          margin:0;
          background:linear-gradient(to right,black,darkslateblue);
          color:white;
          font-family:arial;

          display:flex;
          align-items:center;
          justify-content: space-around;
          height:100vh;
          flex-wrap:wrap;
        }
        img{
            width:250px;
            border-radius:20px;
            border:2px double white;
        }
        h1{
            color:#ff4d4d;
        }
        button{
            padding:12px 25px;
            font-size:18px;
            border-radius: 18px;
            cursor:pointer;
        }
        button:hover{
             transform:scale(1.1);
            filter:brightness(1.2);
            box-shadow: 0px 0px 15px black;
            transition:0.3;
        }
    </Style>
</head>
<body>
    <img src="pic1.jpg">
    <section style="max-width:400px;text-align:center;">
        <h1>
            Arijit Singh Songs 🎶
        </h1>
        <p>Listen your favorite song anytime❤️</p>
        <a href="song.html">
            <button>Go to Song</button>
        </a>
    </section>
</body>
</html>
